<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Reactive Heartbeats</title>
  <desc id="desc">Rudder checks for actionable work before invoking the agent runtime.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1280" height="720" rx="28" fill="#F8FAFC"/>
  <rect x="34" y="34" width="1212" height="652" rx="24" fill="#FFFFFF" stroke="#E2E8F0"/>

  <text x="80" y="92" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="760">Reactive Heartbeats</text>
  <text x="80" y="128" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">Rudder checks for actionable work before invoking the agent runtime.</text>

  <rect x="82" y="256" width="190" height="104" rx="18" fill="#EFF6FF" stroke="#BFDBFE" filter="url(#shadow)"/>
  <text x="177" y="295" text-anchor="middle" fill="#1E3A8A" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="700">Timer heartbeat</text>
  <text x="177" y="321" text-anchor="middle" fill="#1E40AF" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">is enabled</text>

  <rect x="350" y="256" width="218" height="104" rx="18" fill="#F0FDFA" stroke="#99F6E4" filter="url(#shadow)"/>
  <text x="459" y="294" text-anchor="middle" fill="#115E59" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="700">Rudder checks</text>
  <text x="459" y="321" text-anchor="middle" fill="#0F766E" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">for actionable work</text>

  <path d="M718 232L840 308L718 384L596 308L718 232Z" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2" filter="url(#shadow)"/>
  <text x="718" y="295" text-anchor="middle" fill="#9A3412" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="740">Any assigned</text>
  <text x="718" y="321" text-anchor="middle" fill="#9A3412" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="740">or review work?</text>

  <rect x="940" y="172" width="230" height="96" rx="18" fill="#F0FDF4" stroke="#86EFAC" filter="url(#shadow)"/>
  <text x="1055" y="208" text-anchor="middle" fill="#166534" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="740">Pick highest-priority</text>
  <text x="1055" y="234" text-anchor="middle" fill="#15803D" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">issue</text>

  <rect x="940" y="316" width="230" height="96" rx="18" fill="#F8FAFC" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="1055" y="352" text-anchor="middle" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="740">Invoke agent</text>
  <text x="1055" y="378" text-anchor="middle" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">runtime</text>

  <rect x="940" y="460" width="230" height="96" rx="18" fill="#ECFEFF" stroke="#67E8F9" filter="url(#shadow)"/>
  <text x="1055" y="496" text-anchor="middle" fill="#155E75" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="740">Leave evidence</text>
  <text x="1055" y="522" text-anchor="middle" fill="#0E7490" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">on the issue</text>

  <rect x="452" y="486" width="232" height="96" rx="18" fill="#FFF1F2" stroke="#FDA4AF" filter="url(#shadow)"/>
  <text x="568" y="522" text-anchor="middle" fill="#9F1239" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="740">Skip runtime</text>
  <text x="568" y="548" text-anchor="middle" fill="#BE123C" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">invocation</text>

  <rect x="108" y="486" width="232" height="96" rx="18" fill="#F1F5F9" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="224" y="522" text-anchor="middle" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="740">No idle</text>
  <text x="224" y="548" text-anchor="middle" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">token burn</text>

  <path d="M272 308H340" stroke="#334155" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M568 308H590" stroke="#334155" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M840 308H890C910 308 910 220 932 220" stroke="#16A34A" stroke-width="2.8" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1055 268V308" stroke="#334155" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1055 412V452" stroke="#334155" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M596 308H568V478" stroke="#E11D48" stroke-width="2.8" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M452 534H350" stroke="#334155" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="872" y="198" fill="#15803D" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="730">Yes</text>
  <text x="578" y="412" fill="#BE123C" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="730">No</text>

  <rect x="78" y="618" width="1124" height="38" rx="19" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="640" y="643" text-anchor="middle" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Enabled heartbeat means ready to respond, not always consuming tokens.</text>
</svg>
