name: Rudder Issue
description: Report a bug, request a feature, or propose a scoped improvement.
title: "[Issue]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this template for work that should become a durable Rudder issue.
        Good issues explain the goal, the current gap, the expected result, and how the work can be verified.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the issue in one or two concise paragraphs.
      placeholder: What should change, and why does it matter?
    validations:
      required: true

  - type: dropdown
    id: issue_type
    attributes:
      label: Type
      description: Pick the closest category.
      options:
        - Bug
        - Feature
        - UI/UX
        - Documentation
        - Dev experience
        - Release/packaging
        - Refactor/architecture
        - Other
    validations:
      required: true

  - type: textarea
    id: goal_context
    attributes:
      label: Goal context
      description: Explain how this connects to Rudder's agent-work loop or product goal.
      placeholder: Which goal, issue, agent run, review, feedback, budget, or learning workflow is affected?
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: What happens today? Include repro steps for bugs.
      placeholder: |
        1. Go to ...
        2. Do ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What should happen instead?
      placeholder: The user or agent should be able to ...
    validations:
      required: true

  - type: checkboxes
    id: affected_areas
    attributes:
      label: Affected areas
      description: Select all areas that are likely involved.
      options:
        - label: Server/API
        - label: Database/schema/migrations
        - label: Shared types/contracts
        - label: UI/interaction design
        - label: Desktop app/packaging
        - label: CLI/task surface
        - label: Agent runtime/heartbeat
        - label: Docs
        - label: Tests/E2E coverage

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add logs, screenshots, links, traces, commits, or related issues.
      placeholder: Paste concise evidence or links here.

  - type: textarea
    id: implementation_notes
    attributes:
      label: Implementation notes
      description: Optional constraints, known risks, compatibility notes, or suggested approach.
      placeholder: Mention organization scoping, API compatibility, bundled skills, migrations, or UI constraints if relevant.

  - type: textarea
    id: verification
    attributes:
      label: Verification plan
      description: How should a contributor or reviewer confirm the issue is solved?
      placeholder: |
        - Automated checks:
        - Manual checks:
        - E2E/browser/Desktop checks:
    validations:
      required: true
