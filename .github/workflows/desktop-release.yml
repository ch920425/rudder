name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to attach desktop artifacts to, for example v0.1.0 or canary/v0.1.0-canary.1"
        required: true
      source_ref:
        description: "Optional source ref to build from when recovering an existing release tag"
        required: false
  push:
    tags:
      - "v*"
      - "canary/v*"

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            arch: x64
            runner: macos-15-intel
          - platform: macos
            arch: arm64
            runner: macos-14
          - platform: windows
            arch: x64
            runner: windows-latest
          - platform: linux
            arch: x64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_ref || inputs.release_tag || github.ref_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prepare PostgreSQL 18.4 runtime payload
        env:
          MATRIX_PLATFORM: ${{ matrix.platform }}
        run: |
          if [ "${MATRIX_PLATFORM}" = "linux" ]; then
            sudo apt-get update
            sudo apt-get install -y curl ca-certificates
            sudo install -d /usr/share/postgresql-common/pgdg
            sudo curl --fail --location --output /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
              https://www.postgresql.org/media/keys/ACCC4CF8.asc
            . /etc/os-release
            echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
              | sudo tee /etc/apt/sources.list.d/pgdg.list
            sudo apt-get update
            sudo apt-get install -y postgresql-18
            echo "RUDDER_POSTGRES_BIN_DIR=/usr/lib/postgresql/18/bin" >> "$GITHUB_ENV"
            /usr/lib/postgresql/18/bin/postgres --version
            exit 0
          fi

          if [ "${MATRIX_PLATFORM}" = "windows" ]; then
            export PG_ARCHIVE_URL="https://get.enterprisedb.com/postgresql/postgresql-18.4-1-windows-x64-binaries.zip"
          else
            export PG_ARCHIVE_URL="https://get.enterprisedb.com/postgresql/postgresql-18.4-1-osx-binaries.zip"
          fi

          node --input-type=module <<'NODE'
          import { mkdir, readdir, stat, writeFile } from "node:fs/promises";
          import path from "node:path";
          import { spawnSync } from "node:child_process";

          const archiveUrl = process.env.PG_ARCHIVE_URL;
          const workspace = process.env.GITHUB_WORKSPACE;
          const platform = process.platform;
          const workDir = path.join(workspace, ".postgres-runtime");
          const archivePath = path.join(workDir, "postgresql-18.4.zip");
          const extractDir = path.join(workDir, "extract");
          await mkdir(extractDir, { recursive: true });
          const response = await fetch(archiveUrl);
          if (!response.ok) throw new Error(`failed to download ${archiveUrl}: ${response.status} ${response.statusText}`);
          await writeFile(archivePath, Buffer.from(await response.arrayBuffer()));
          const extract = spawnSync("tar", ["-xf", archivePath, "-C", extractDir], { encoding: "utf8" });
          if (extract.status !== 0) throw new Error(`failed to extract PostgreSQL archive: ${extract.stderr || extract.stdout}`);

          const executable = (name) => platform === "win32" ? `${name}.exe` : name;
          const queue = [extractDir];
          let binDir = null;
          for (let i = 0; i < queue.length && !binDir; i += 1) {
            const current = queue[i];
            const entries = await readdir(current, { withFileTypes: true }).catch(() => []);
            if (entries.some((entry) => entry.isFile() && entry.name === executable("postgres"))) binDir = current;
            for (const entry of entries) if (entry.isDirectory()) queue.push(path.join(current, entry.name));
          }
          if (!binDir) throw new Error("PostgreSQL archive did not contain a postgres binary");
          for (const name of ["initdb", "pg_ctl", "postgres"]) {
            await stat(path.join(binDir, executable(name)));
          }
          const version = spawnSync(path.join(binDir, executable("postgres")), ["--version"], { encoding: "utf8" });
          if (version.status !== 0 || !/\bPostgreSQL\)?\s+18\.4\b/i.test(`${version.stdout}\n${version.stderr}`)) {
            throw new Error(`unexpected PostgreSQL version: ${version.stdout || version.stderr}`);
          }
          await writeFile(process.env.GITHUB_ENV, `RUDDER_POSTGRES_BIN_DIR=${binDir}\n`, { flag: "a" });
          console.log(`Using PostgreSQL runtime payload from ${binDir}`);
          NODE

      - name: Build desktop portable asset
        env:
          RUDDER_DESKTOP_TARGET_ARCH: ${{ matrix.arch }}
        run: |
          tag="${{ inputs.release_tag || github.ref_name }}"
          version="${tag##*/}"
          version="${version#v}"
          node scripts/release-package-map.mjs set-version "${version}"

          if [ "$(uname -s)" = "Darwin" ]; then
            ulimit -n 65536 || ulimit -n 10240 || true
            echo "macOS open file limit: $(ulimit -n)"
          fi

          pnpm desktop:dist

      - name: Collect release asset
        id: collect
        run: |
          tag="${{ inputs.release_tag || github.ref_name }}"
          version="${tag##*/}"
          version="${version#v}"
          node scripts/collect-desktop-release-assets.mjs \
            --version "${version}" \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --out dist/desktop-assets

      - uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/desktop-assets/*
          if-no-files-found: error

  publish:
    name: Attach desktop artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_ref || inputs.release_tag || github.ref_name }}

      - uses: actions/download-artifact@v8
        with:
          path: dist/desktop-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist/desktop-assets
          shasum -a 256 Rudder-* > SHASUMS256.txt
          cat SHASUMS256.txt

      - name: Create or update GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ inputs.release_tag || github.ref_name }}"
          release_title="${tag##*/}"
          notes_file="releases/${tag}.md"
          release_args=(create "${tag}" --title "${release_title}")
          if [[ "${tag}" == canary/* ]]; then
            release_args+=(--prerelease)
          fi

          if ! gh release view "${tag}" >/dev/null 2>&1; then
            if [ -f "${notes_file}" ]; then
              gh release "${release_args[@]}" --notes-file "${notes_file}"
            else
              gh release "${release_args[@]}" --notes "Desktop artifacts for ${tag}."
            fi
          else
            edit_args=(edit "${tag}" --title "${release_title}")
            if [[ "${tag}" == canary/* ]]; then
              edit_args+=(--prerelease)
            fi
            gh release "${edit_args[@]}"
          fi

          find dist/desktop-assets -maxdepth 1 -type f \( -name 'Rudder-*' -o -name 'SHASUMS256.txt' \) \
            | sort \
            | while IFS= read -r asset; do
              echo "Uploading ${asset}"
              gh release upload "${tag}" "${asset}" --clobber
            done
