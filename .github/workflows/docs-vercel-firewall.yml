name: Docs Vercel firewall

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  VERCEL_ORG_ID: team_eu3qF8T1G0150GL2tqHOrG6Q
  VERCEL_PROJECT_ID: prj_ppjxvoIGcoV3jGTeq8vBhzObXaJV

jobs:
  apply:
    name: Apply docs firewall rules
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.repository == 'Undertone0809/rudder'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Vercel SDK
        run: npm install --no-save --no-package-lock @vercel/sdk@latest

      - name: Apply common docs 404 probe block
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: node scripts/apply-docs-vercel-firewall.mjs
